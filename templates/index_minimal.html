<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>ゲーム名</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; overflow-x: hidden; }
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #111; color: #fff; }
    button { font: inherit; min-height: 44px; }
    .app { width: min(100%, 430px); margin: 0 auto; padding: 16px; }
    .screen { display: none; }
    .screen.active { display: block; }
    .game-area { user-select: none; -webkit-user-select: none; -webkit-touch-callout: none; touch-action: manipulation; }
  </style>
</head>
<body>
  <main class="app">
    <section id="home" class="screen active">
      <h1>ゲーム名</h1>
      <p>ゲーム説明をここに書く。</p>
      <button id="startBtn">ゲーム開始</button>
      <button id="ruleBtn">ルール説明</button>
      <button id="shareBtn">ゲームをシェア</button>
      <a href="https://chameleonjp.codeberg.page/chameleonjp_lab/">実験場へ</a>
    </section>

    <section id="game" class="screen game-area">
      <p>ゲーム画面</p>
      <button id="finishBtn">終了</button>
    </section>

    <section id="result" class="screen">
      <h2>結果</h2>
      <p id="resultText"></p>
      <button id="retryBtn">もう一度</button>
      <button id="shareResultBtn">結果をシェア</button>
      <button id="homeBtn">ホームへ</button>
      <a href="https://chameleonjp.codeberg.page/chameleonjp_lab/">実験場へ</a>
    </section>
  </main>

  <script>
    const screens = {
      home: document.getElementById('home'),
      game: document.getElementById('game'),
      result: document.getElementById('result')
    };

    function showScreen(name) {
      Object.values(screens).forEach(screen => screen.classList.remove('active'));
      screens[name].classList.add('active');
    }

    document.getElementById('startBtn').addEventListener('click', () => showScreen('game'));
    document.getElementById('finishBtn').addEventListener('click', () => {
      document.getElementById('resultText').textContent = '結果を表示します。';
      showScreen('result');
    });
    document.getElementById('retryBtn').addEventListener('click', () => showScreen('game'));
    document.getElementById('homeBtn').addEventListener('click', () => showScreen('home'));
  </script>
</body>
</html>
